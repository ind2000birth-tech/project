{% extends 'layout/base.html' %}

{% block content %}
<section class="max-w-7xl mx-auto px-6 lg:px-12 py-20">
    <div class="flex flex-col lg:flex-row gap-16">
        <!-- Contact Form -->
        <div class="lg:w-3/5">
            <h2 class="text-4xl md:text-5xl font-bold font-outfit mb-8">Get In <span class="text-primary">Touch</span>
            </h2>
            <form action="{{ url_for('contact_bp.contact') }}" method="POST" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-400">Name</label>
                        <input type="text" name="name" required
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 focus:outline-none focus:border-primary transition-colors text-white"
                            placeholder="John Doe">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-400">Email</label>
                        <input type="email" name="email" required
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 focus:outline-none focus:border-primary transition-colors text-white"
                            placeholder="john@example.com">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-400">Message</label>
                    <textarea name="message" rows="6" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 focus:outline-none focus:border-primary transition-colors text-white resize-none"
                        placeholder="Your message here..."></textarea>
                </div>
                <button type="submit"
                    class="w-full md:w-auto px-12 py-4 bg-primary text-dark font-bold rounded-xl hover:bg-white transition-all transform hover:scale-105 shadow-lg shadow-primary/20">
                    Send Message
                </button>
            </form>
        </div>

        <!-- Contact Info & References -->
        <div class="lg:w-2/5 space-y-12">
            <div class="glass p-8 rounded-3xl space-y-8">
                <h3 class="text-2xl font-bold font-outfit">Contact Info</h3>
                <div class="space-y-6">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                        <div>
                            <div class="text-sm text-gray-400">Email Me</div>
                            <div class="font-medium">kathishsudhakar84@gmail.com</div>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <div
                            class="w-12 h-12 rounded-full bg-secondary/10 flex items-center justify-center text-secondary">
                            <i class="fa-solid fa-location-dot"></i>
                        </div>
                        <div>
                            <div class="text-sm text-gray-400">tirunelveli</div>
                            <div class="font-medium">Tirunelveli, India</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-center">
                <button id="show-references"
                    class="px-8 py-4 glass text-white font-bold rounded-full hover:bg-white/10 transition-all border border-white/20">
                    Show Reference Contacts
                </button>
            </div>

            <div id="references-container" class="hidden space-y-4 animate-fade-in">
                <!-- References will be loaded here -->
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('show-references').addEventListener('click', function () {
        const container = document.getElementById('references-container');
        const button = this;

        if (container.classList.contains('hidden')) {
            fetch('/api/references')
                .then(response => response.json())
                .then(data => {
                    container.innerHTML = '';
                    if (data.length === 0) {
                        container.innerHTML = '<div class="glass p-6 rounded-2xl text-center text-gray-500">No references available.</div>';
                    } else {
                        data.forEach(ref => {
                            container.innerHTML += `
                            <div class="glass p-6 rounded-2xl border border-secondary/20 hover:border-secondary/50 transition-colors">
                                <div class="font-bold text-lg mb-1">${ref.name}</div>
                                <div class="text-sm text-gray-400 flex items-center gap-2 mb-1">
                                    <i class="fa-solid fa-envelope text-[10px]"></i> ${ref.email}
                                </div>
                                <div class="text-sm text-gray-400 flex items-center gap-2">
                                    <i class="fa-solid fa-phone text-[10px]"></i> ${ref.phone}
                                </div>
                            </div>
                        `;
                        });
                    }
                    container.classList.remove('hidden');
                    button.textContent = 'Hide References';
                });
        } else {
            container.classList.add('hidden');
            button.textContent = 'Show Reference Contacts';
        }
    });
</script>
{% endblock %}
