<nav class="fixed top-0 left-0 w-full z-50 glass border-b border-white/10 transition-all duration-300" id="main-nav">
    <div class="max-w-7xl mx-auto px-6 lg:px-12 py-4">
        <div class="flex items-center justify-between">
            <a href="{{ url_for('home_bp.index') }}"
                class="text-2xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">
                PORTFOLIO
            </a>

            <!-- Desktop Menu -->
            <div class="hidden md:flex items-center space-x-8">
                <a href="{{ url_for('home_bp.index') }}"
                    class="text-sm font-medium hover:text-primary transition-colors">Home</a>
                <a href="{{ url_for('about_bp.about') }}"
                    class="text-sm font-medium hover:text-primary transition-colors">About</a>
                <a href="{{ url_for('experience_bp.experience') }}"
                    class="text-sm font-medium hover:text-primary transition-colors">Experience</a>
                <a href="{{ url_for('project_bp.projects') }}"
                    class="text-sm font-medium hover:text-primary transition-colors">Projects</a>
                <a href="{{ url_for('contact_bp.contact') }}"
                    class="text-sm font-medium hover:text-primary transition-colors">Contact</a>
                {% if current_user.is_authenticated %}
                <a href="{{ url_for('admin_bp.dashboard') }}"
                    class="px-4 py-2 rounded-full border border-primary/50 text-primary text-xs font-bold hover:bg-primary hover:text-dark transition-all">ADMIN</a>
                {% else %}
                <a href="{{ url_for('admin_bp.login') }}"
                    class="text-sm font-medium hover:text-primary transition-colors">Admin</a>
                {% endif %}
            </div>

            <!-- Mobile Menu Toggle -->
            <button class="md:hidden text-white focus:outline-none" id="mobile-menu-toggle">
                <i class="fa-solid fa-bars text-2xl"></i>
            </button>
        </div>
    </div>

    <!-- Mobile Menu Overlay -->
    <div class="fixed inset-0 bg-dark/95 z-50 transform translate-x-full transition-transform duration-300 ease-in-out md:hidden"
        id="mobile-menu">
        <div class="flex flex-col items-center justify-center h-full space-y-8">
            <button class="absolute top-6 right-6 text-white" id="mobile-menu-close">
                <i class="fa-solid fa-xmark text-3xl"></i>
            </button>
            <a href="{{ url_for('home_bp.index') }}" class="text-2xl font-bold hover:text-primary mobile-link">Home</a>
            <a href="{{ url_for('about_bp.about') }}"
                class="text-2xl font-bold hover:text-primary mobile-link">About as</a>
            <a href="{{ url_for('experience_bp.experience') }}"
                class="text-2xl font-bold hover:text-primary mobile-link">Experience</a>
            <a href="{{ url_for('project_bp.projects') }}"
                class="text-2xl font-bold hover:text-primary mobile-link">Projects</a>
            <a href="{{ url_for('contact_bp.contact') }}"
                class="text-2xl font-bold hover:text-primary mobile-link">Contact</a>
            {% if current_user.is_authenticated %}
            <a href="{{ url_for('admin_bp.dashboard') }}"
                class="text-2xl font-bold text-primary mobile-link">Dashboard</a>
            {% else %}
            <a href="{{ url_for('admin_bp.login') }}" class="text-2xl font-bold hover:text-primary mobile-link">Admin
                Login</a>
            {% endif %}
        </div>
    </div>
</nav>

<script>
    const nav = document.getElementById('main-nav');
    const mobileMenu = document.getElementById('mobile-menu');
    const toggle = document.getElementById('mobile-menu-toggle');
    const close = document.getElementById('mobile-menu-close');
    const links = document.querySelectorAll('.mobile-link');

    window.onscroll = () => {
        if (window.scrollY > 50) {
            nav.classList.add('py-2', 'bg-dark/80');
            nav.classList.remove('py-4');
        } else {
            nav.classList.add('py-4');
            nav.classList.remove('py-2', 'bg-dark/80');
        }
    };

    toggle.onclick = () => mobileMenu.classList.remove('translate-x-full');
    close.onclick = () => mobileMenu.classList.add('translate-x-full');
    links.forEach(link => link.onclick = () => mobileMenu.classList.add('translate-x-full'));
</script>
