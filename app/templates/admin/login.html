{% extends 'layout/base.html' %}

{% block content %}
<section class="min-h-screen flex items-center justify-center px-6">
    <div class="glass p-12 rounded-3xl w-full max-w-md space-y-8 animate-fade-in shadow-2xl border-white/5">
        <div class="text-center space-y-2">
            <h2 class="text-3xl font-bold font-outfit">Admin <span class="text-primary">Portal</span></h2>
            <p class="text-gray-400 text-sm">Please sign in to manage your portfolio</p>
        </div>

        <form action="{{ url_for('admin_bp.login') }}" method="POST" class="space-y-6">
            <div class="space-y-2">
                <label class="text-sm font-medium text-gray-400">Username</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" name="username" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl pl-12 pr-4 py-4 focus:outline-none focus:border-primary transition-colors text-white"
                        placeholder="admin">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-gray-400">Password</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" name="password" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl pl-12 pr-4 py-4 focus:outline-none focus:border-secondary transition-colors text-white"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit"
                class="w-full py-4 bg-gradient-to-r from-primary to-secondary text-dark font-bold rounded-xl hover:opacity-90 transition-all transform hover:scale-[1.02] shadow-lg shadow-primary/20">
                Log In
            </button>
        </form>

        <div class="text-center">
            <a href="{{ url_for('home_bp.index') }}" class="text-gray-500 hover:text-white text-sm transition-colors">
                <i class="fa-solid fa-arrow-left mr-2"></i> Back to Homepage
            </a>
        </div>
    </div>
</section>
{% endblock %}
